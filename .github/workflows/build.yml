name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip project.zip

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Fix Gradle file
        run: |
          sed -i 's/versionCode = flutter.versionCode/versionCode = 1/g' android/app/build.gradle.kts
          sed -i 's/versionName = flutter.versionName/versionName = "1.0"/g' android/app/build.gradle.kts

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/app/outputs/flutter-apk/app-release.apk
